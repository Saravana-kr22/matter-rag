# Protocol TC → Spec Section Mapping
#
# Maps protocol-area test case titles (keywords) and per-TC overrides to spec section
# path substrings.  Used by test_plan_extractor._link_spec_records() to link protocol
# TCs to precise spec requirement nodes instead of using chapter-level bulk matching.
#
# Resolution order (first match wins):
#   1. tc_id_patterns  — exact TC-ID match (e.g. "TC-DD-1.2")
#   2. title_patterns  — case-insensitive keyword in TC title
#   3. Chapter-level fallback — _TC_PREFIX_TO_PROTO_AREA bulk match (always runs if
#                               no map entry exists or map yields no hits)
#
# "sections" values are substring-matched against the cleaned section path stored in
# the spec index under "_section:" keys.  Use lowercase; partial matches are fine.
# Example: "manual pairing code" matches "_section:device discovery > manual pairing code"
#
# To add coverage for a new TC family:
#   1. Add an entry under title_patterns (preferred) or tc_id_patterns.
#   2. Run  python scripts/run_ghpr_analysis.py --build-knowledge-graph
#      to rebuild the KG with the updated mappings.
#
# ──────────────────────────────────────────────────────────────────────────────
# PER-TC OVERRIDES  (exact TC-ID match; highest priority)
# ──────────────────────────────────────────────────────────────────────────────
tc_id_patterns: {}
# Examples (uncomment and add sections to override):
# tc_id_patterns:
#   TC-DD-1.2:
#     sections:
#       - "manual pairing code"
#       - "setup code"


# ──────────────────────────────────────────────────────────────────────────────
# TITLE KEYWORD PATTERNS  (case-insensitive substring match against TC title)
# ──────────────────────────────────────────────────────────────────────────────
